<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect x="0" y="0" width="900" height="600" rx="14" fill="#0f1117"/>

  <text x="40" y="48" font-size="26" font-weight="700" fill="#e8ecf4">The school is the cluster</text>
  <text x="40" y="74" font-size="14" fill="#8b95a7">Nested containment — every box lives inside the one above it.</text>

  <rect x="40" y="96" width="820" height="476" rx="12" fill="none" stroke="#4f8cff" stroke-width="2"/>
  <text x="62" y="126" font-size="14" font-weight="700" fill="#4f8cff">SCHOOL = Cluster</text>

  <rect x="582" y="118" width="252" height="86" rx="8" fill="#a78bfa" fill-opacity="0.09" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="598" y="146" font-size="14" font-weight="700" fill="#c4b5fd">Front office = control plane</text>
  <text x="598" y="167" font-size="12" fill="#8b95a7">API server · etcd · scheduler</text>
  <text x="598" y="192" font-size="12" fill="#8b95a7" font-style="italic">Records and directs — never in the data path</text>

  <rect x="64" y="240" width="370" height="312" rx="10" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-width="2"/>
  <text x="82" y="268" font-size="13" font-weight="700" fill="#34d399">ROOM = Node</text>

  <rect x="92" y="296" width="150" height="232" rx="8" fill="#fbbf24" fill-opacity="0.07" stroke="#fbbf24" stroke-width="2"/>
  <text x="106" y="320" font-size="12" font-weight="700" fill="#fbbf24">DESK = Pod</text>
  <circle cx="167" cy="378" r="22" fill="#f472b6"/>
  <rect x="145" y="400" width="44" height="56" rx="18" fill="#f472b6"/>
  <text x="106" y="504" font-size="11" font-weight="600" fill="#f8b4d9">STUDENT = Container</text>

  <rect x="258" y="306" width="120" height="212" rx="8" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.35"/>
  <text x="276" y="416" font-size="12" fill="#8b95a7" opacity="0.7">…more desks</text>

  <rect x="466" y="240" width="370" height="312" rx="10" fill="#34d399" fill-opacity="0.06" stroke="#34d399" stroke-width="2"/>
  <text x="484" y="268" font-size="13" font-weight="700" fill="#34d399">ROOM = Node</text>

  <rect x="494" y="296" width="150" height="232" rx="8" fill="#fbbf24" fill-opacity="0.07" stroke="#fbbf24" stroke-width="2"/>
  <text x="508" y="320" font-size="12" font-weight="700" fill="#fbbf24">DESK = Pod</text>
  <circle cx="569" cy="378" r="22" fill="#f472b6"/>
  <rect x="547" y="400" width="44" height="56" rx="18" fill="#f472b6"/>
  <text x="508" y="504" font-size="11" font-weight="600" fill="#f8b4d9">STUDENT = Container</text>

  <rect x="660" y="306" width="120" height="212" rx="8" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.35"/>
  <text x="678" y="416" font-size="12" fill="#8b95a7" opacity="0.7">…more desks</text>

  <text x="40" y="590" font-size="12" fill="#8b95a7">Real Kubernetes terms in bold. The front office sits outside the rooms — it never carries student-to-student traffic.</text>
</svg>
