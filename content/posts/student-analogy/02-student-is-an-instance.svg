<svg viewBox="0 0 900 660" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect x="0" y="0" width="900" height="660" rx="14" fill="#0f1117"/>

  <defs>
    <marker id="slate" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <marker id="purple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
  </defs>

  <text x="40" y="46" font-size="26" font-weight="700" fill="#e8ecf4">A student is an instance of a lesson plan</text>
  <text x="40" y="72" font-size="14" fill="#8b95a7">The plan is fixed and lifeless. The student is a living enactment of it — and there can be many.</text>

  <!-- ===== Section 1: one plan, many students ===== -->
  <!-- Lesson plan = Image (real spec) -->
  <rect x="56" y="104" width="240" height="214" rx="10" fill="#94a3b8" fill-opacity="0.10" stroke="#94a3b8" stroke-width="2"/>
  <text x="74" y="132" font-size="13" font-weight="700" fill="#cbd5e1">LESSON PLAN = Image</text>
  <g font-family="ui-monospace, 'JetBrains Mono', Menlo, Consolas, monospace" font-size="11.5">
    <text x="74" y="166"><tspan fill="#a5b4fc">FROM</tspan> <tspan fill="#cbd5e1">app:2.3.1</tspan></text>
    <text x="74" y="188"><tspan fill="#a5b4fc">ENTRYPOINT</tspan> <tspan fill="#cbd5e1">/srv/app</tspan></text>
    <text x="74" y="210"><tspan fill="#a5b4fc">EXPOSE</tspan> <tspan fill="#cbd5e1">8080/tcp</tspan></text>
    <text x="74" y="232"><tspan fill="#a5b4fc">ENV</tspan> <tspan fill="#cbd5e1">LOG_LEVEL=info</tspan></text>
    <text x="74" y="254"><tspan fill="#a5b4fc">LABEL</tspan> <tspan fill="#cbd5e1">tier=web</tspan></text>
  </g>
  <text x="74" y="298" font-size="12" font-style="italic" fill="#8b95a7">immutable — never changes</text>

  <!-- trunk + elbow drops into each container -->
  <text x="392" y="110" font-size="12" font-style="italic" fill="#94a3b8">instantiate</text>
  <polyline points="296,200 340,200 340,120 780,120" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="540" y1="120" x2="540" y2="146" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#slate)"/>
  <line x1="660" y1="120" x2="660" y2="146" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#slate)"/>
  <line x1="780" y1="120" x2="780" y2="146" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#slate)"/>

  <!-- three identical students = containers -->
  <g>
    <circle cx="540" cy="170" r="20" fill="#f472b6"/>
    <rect x="518" y="190" width="44" height="50" rx="18" fill="#f472b6"/>
    <text x="540" y="262" font-size="10" fill="#8b95a7" text-anchor="middle">container</text>
  </g>
  <g>
    <circle cx="660" cy="170" r="20" fill="#f472b6"/>
    <rect x="638" y="190" width="44" height="50" rx="18" fill="#f472b6"/>
    <text x="660" y="262" font-size="10" fill="#8b95a7" text-anchor="middle">container</text>
  </g>
  <g>
    <circle cx="780" cy="170" r="20" fill="#f472b6"/>
    <rect x="758" y="190" width="44" height="50" rx="18" fill="#f472b6"/>
    <text x="780" y="262" font-size="10" fill="#8b95a7" text-anchor="middle">container</text>
  </g>
  <text x="660" y="294" font-size="12" font-weight="600" fill="#f8b4d9" text-anchor="middle">Many identical students — one plan</text>

  <!-- divider -->
  <line x1="40" y1="324" x2="860" y2="324" stroke="#2a2f3a" stroke-width="1"/>

  <!-- ===== Section 2: default amnesia ===== -->
  <text x="40" y="362" font-size="20" font-weight="700" fill="#e8ecf4">Default amnesia</text>
  <text x="40" y="386" font-size="14" fill="#8b95a7">Kill a student and the replacement starts from the plan — with zero memory of what the dead one did.</text>

  <!-- dying student -->
  <text x="110" y="416" font-size="12" font-weight="700" fill="#f87171" text-anchor="middle">✕ killed</text>
  <circle cx="110" cy="462" r="22" fill="#f472b6"/>
  <rect x="88" y="484" width="44" height="52" rx="18" fill="#f472b6"/>
  <!-- kill mark: white core with dark halo, readable on pink and on dark bg -->
  <line x1="86" y1="444" x2="134" y2="532" stroke="#0f1117" stroke-width="6"/>
  <line x1="134" y1="444" x2="86" y2="532" stroke="#0f1117" stroke-width="6"/>
  <line x1="86" y1="444" x2="134" y2="532" stroke="#ffffff" stroke-width="3.5"/>
  <line x1="134" y1="444" x2="86" y2="532" stroke="#ffffff" stroke-width="3.5"/>
  <text x="110" y="558" font-size="11" fill="#8b95a7" text-anchor="middle">running container</text>

  <!-- its lost memory -->
  <rect x="152" y="430" width="192" height="92" rx="10" fill="#94a3b8" fill-opacity="0.10" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="166" y="456" font-size="12" font-weight="700" fill="#cbd5e1">in-memory state</text>
  <text x="166" y="478" font-size="11" fill="#8b95a7">built up while it runs —</text>
  <text x="166" y="496" font-size="11" fill="#8b95a7">terminated and lost when</text>
  <text x="166" y="514" font-size="11" fill="#8b95a7">the student leaves the room</text>

  <!-- transition -->
  <text x="408" y="450" font-size="12" font-weight="600" fill="#c4b5fd" text-anchor="middle">replaced by</text>
  <line x1="348" y1="468" x2="474" y2="468" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#purple)"/>

  <!-- fresh student -->
  <circle cx="560" cy="462" r="22" fill="#f472b6"/>
  <rect x="538" y="484" width="44" height="52" rx="18" fill="#f472b6"/>
  <text x="560" y="558" font-size="11" fill="#8b95a7" text-anchor="middle">replacement — same image</text>

  <!-- empty memory -->
  <rect x="606" y="432" width="184" height="70" rx="10" fill="none" stroke="#e8ecf4" stroke-width="1.5" stroke-dasharray="4 4"/>
  <text x="620" y="458" font-size="12" font-weight="700" fill="#e8ecf4">memory: none</text>
  <text x="620" y="478" font-size="12" fill="#8b95a7">knows only the plan</text>

  <!-- forward pointer -->
  <text x="40" y="616" font-size="12" fill="#8b95a7">Everything in the left bubble is gone. State that must survive a restart needs an exercise book that follows the student —</text>
  <text x="40" y="636" font-size="12" fill="#8b95a7">a volume. (That's the next break, and the hook for the storage post.)</text>
</svg>
