<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <rect x="0" y="0" width="900" height="560" rx="14" fill="#0f1117"/>

  <text x="40" y="48" font-size="26" font-weight="700" fill="#e8ecf4">The desk is the boundary</text>
  <text x="40" y="74" font-size="14" fill="#8b95a7">Share a desk and you share its notes and its address. Leave the desk and every exchange is a network hop.</text>

  <rect x="48" y="110" width="430" height="360" rx="12" fill="#fbbf24" fill-opacity="0.06" stroke="#fbbf24" stroke-width="2.5"/>
  <text x="68" y="140" font-size="14" font-weight="700" fill="#fbbf24">DESK = Pod</text>
  <text x="263" y="105" font-size="11" font-weight="600" fill="#fbbf24" text-anchor="middle">one nameplate = one Pod IP</text>

  <circle cx="150" cy="230" r="26" fill="#f472b6"/>
  <rect x="124" y="258" width="52" height="62" rx="20" fill="#f472b6"/>
  <text x="150" y="350" font-size="13" font-weight="700" fill="#f8b4d9" text-anchor="middle">Student</text>
  <text x="150" y="368" font-size="11" fill="#8b95a7" text-anchor="middle">doer container</text>

  <circle cx="376" cy="230" r="26" fill="#60a5fa"/>
  <rect x="350" y="258" width="52" height="62" rx="20" fill="#60a5fa"/>
  <text x="376" y="350" font-size="13" font-weight="700" fill="#bfdbfe" text-anchor="middle">One-to-one aide</text>
  <text x="376" y="368" font-size="11" fill="#8b95a7" text-anchor="middle">sidecar container</text>

  <line x1="186" y1="250" x2="340" y2="250" stroke="#e8ecf4" stroke-width="2" stroke-dasharray="2 6" stroke-linecap="round"/>
  <text x="263" y="240" font-size="12" font-weight="600" fill="#e8ecf4" text-anchor="middle">localhost</text>
  <text x="263" y="276" font-size="11" fill="#8b95a7" text-anchor="middle">lean over and talk</text>

  <rect x="203" y="392" width="120" height="52" rx="8" fill="#34d399" fill-opacity="0.12" stroke="#34d399" stroke-width="1.5"/>
  <text x="263" y="416" font-size="12" font-weight="700" fill="#34d399" text-anchor="middle">shared notes</text>
  <text x="263" y="433" font-size="11" fill="#8b95a7" text-anchor="middle">= volume</text>

  <rect x="620" y="180" width="232" height="220" rx="12" fill="#fbbf24" fill-opacity="0.04" stroke="#fbbf24" stroke-width="2"/>
  <text x="640" y="208" font-size="13" font-weight="700" fill="#fbbf24">Another desk = Pod</text>
  <circle cx="736" cy="285" r="24" fill="#f472b6"/>
  <rect x="712" y="311" width="48" height="56" rx="18" fill="#f472b6"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#a78bfa"/>
    </marker>
  </defs>
  <line x1="478" y1="250" x2="612" y2="250" stroke="#a78bfa" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="545" y="240" font-size="12" font-weight="600" fill="#c4b5fd" text-anchor="middle">network hop</text>
  <text x="545" y="276" font-size="11" fill="#8b95a7" text-anchor="middle">via a Service</text>

  <text x="40" y="520" font-size="12" fill="#8b95a7">Inside one desk: shared volume, shared IP, talk over localhost. Across desks: a network hop through a Service.</text>
  <text x="40" y="540" font-size="12" fill="#8b95a7">Mutual relationship → two pods (peer Services). One-directional dependency → one pod (sidecar).</text>
</svg>
